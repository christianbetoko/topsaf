name: Deploy Laravel Bootstrap/Filament to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  laravel-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Vérifiez votre version sur Hostinger
          extensions: mbstring, dom, curl, libxml, mysql, zip, intl, gd

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Sync files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "."
          target: "domains/topsante-fukang.com/public_html"
          exclude: |
            .git*
            node_modules
            tests
            storage/framework/cache/data/*
            storage/framework/sessions/*
            storage/framework/views/*
            storage/logs/*

      - name: Run Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd domains/topsante-fukang.com/public_html
            # Mise à jour de la base MySQL
            php artisan migrate --force
            # Optimisation pour la production
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            # Spécifique à Filament
            php artisan filament:cache-components
            php artisan icons:cache
            # Nettoyage des dossiers temporaires et droits
            chmod -R 775 storage bootstrap/cache